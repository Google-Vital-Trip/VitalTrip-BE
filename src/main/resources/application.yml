server:
  port: ${PORT:3000}

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_DATABASE:vitaltrip}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
    show-sql: false
  jackson:
    serialization:
      write-dates-as-timestamps: false
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: gpt-4o

app:
  jwt:
    secret: ${JWT_SECRET:vitaltrip-secret-key-must-be-at-least-32-characters-long}
    refresh-secret: ${JWT_REFRESH_SECRET:vitaltrip-refresh-secret-key-must-be-at-least-32-chars}
    expires-in: ${JWT_EXPIRES_IN:7d}
    refresh-expires-in: ${JWT_REFRESH_EXPIRES_IN:30d}
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    callback-url: ${GOOGLE_CALLBACK_URL:http://localhost:3000/api/auth/google/callback}
    places-api-key: ${GOOGLE_PLACES_API_KEY:}
  cors:
    allowed-origin: ${ALLOWED_ORIGIN:*}
  frontend-url: ${FRONTEND_URL:https://aivitaltrip.com}
  node-env: ${NODE_ENV:development}
